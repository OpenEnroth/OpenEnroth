name: Bazel Build

on:
  pull_request: null
  workflow_dispatch:

env:
  NDK_VERSION: 28.1.13356709
  BAZEL_VERSION: 8.x

jobs:
  bazel_build:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target:
          - windows_x86_64
          - darwin_arm64
          - darwin_x86_64
          - linux_x86_64
          - linux_x86
          - android_arm64_v8a
          - android_armeabi_v7a
          - android_x86_64
    runs-on: >-
      ${{
        startsWith(matrix.target, 'windows_') && 'windows-2022' ||
        startsWith(matrix.target, 'darwin_')  && 'macos-15'     ||
        'ubuntu-24.04'
      }}
    defaults:
      run:
        shell: bash
    steps:
      - name: 'Initialize matrix vars'
        run: |
          set -euo pipefail
          target="${{matrix.target}}"
          case "$target" in
            windows_x86_64)      platform=windows; bazel_config=windows_x86_64;;
            linux_x86_64)        platform=linux;   bazel_config=linux_x86_64;;
            linux_x86)           platform=linux;   bazel_config=linux_x86;;
            darwin_arm64)        platform=darwin;  bazel_config=darwin_arm64;;
            darwin_x86_64)       platform=darwin;  bazel_config=darwin_x86_64;;
            android_arm64_v8a)   platform=android; bazel_config=android_arm64_v8a;;
            android_armeabi_v7a) platform=android; bazel_config=android_armeabi_v7a;;
            android_x86_64)      platform=android; bazel_config=android_x86_64;;
            *) echo "Unknown target: $target" >&2; exit 1;;
          esac
          echo "MATRIX_PLATFORM=$platform" >> "$GITHUB_ENV"
          echo "MATRIX_BAZEL_CONFIG=$bazel_config" >> "$GITHUB_ENV"
          # On Windows CI runners, ANDROID_HOME is pre-set to C:\Android\android-sdk which
          # contains NDK 27.x. rules_android_ndk auto-discovers it and then fails with Bazel 8
          # sandbox enforcement: "Cannot write outside of the repository directory".
          # Clear Android env vars for all non-Android platforms so rules_android_ndk falls
          # through to the stub path (no NDK = empty @androidndk with no toolchains).
          # Android builds set ANDROID_NDK_HOME explicitly in [android] Install NDK step.
          if [ "$platform" != "android" ]; then
            echo "ANDROID_HOME=" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_HOME=" >> "$GITHUB_ENV"
          fi

      - name: '[linux/android] Configure fast APT mirror'
        if: env.MATRIX_PLATFORM == 'linux' || env.MATRIX_PLATFORM == 'android'
        uses: vegardit/fast-apt-mirror.sh@v1

      - name: '[darwin] Set up Xcode'
        if: env.MATRIX_PLATFORM == 'darwin'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.3

      - name: 'Checkout'
        uses: actions/checkout@v5.0.0
        with:
          # Submodules are only needed on Windows: thirdparty/luajit/ headers are referenced
          # by the @luajit_windows prebuilt wrapper. All other platforms fetch deps via http_archive.
          submodules: ${{ env.MATRIX_PLATFORM == 'windows' && 'recursive' || 'false' }}

      - name: '[android] Install NDK'
        if: env.MATRIX_PLATFORM == 'android'
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: '[linux] Install dependencies'
        if: env.MATRIX_PLATFORM == 'linux'
        uses: Wandalen/wretry.action@master
        with:
          attempt_limit: 3
          attempt_delay: 5000
          command: |
            if [ "${{env.MATRIX_BAZEL_CONFIG}}" = "linux_x86" ]; then
              sudo dpkg --add-architecture i386
              sudo apt-get update
              sudo apt-get install -y gcc-14-multilib g++-14-multilib lld
              sudo apt-get install -y libglu1-mesa-dev:i386 libdwarf-dev:i386 libelf-dev:i386
              # SDL3 source build requires X11/Wayland headers (32-bit for linux_x86).
              sudo apt-get install -y libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 \
                libxcursor-dev:i386 libxi-dev:i386 libxfixes-dev:i386 \
                libwayland-dev:i386 libxkbcommon-dev:i386
            else
              sudo apt-get update
              sudo apt-get install -y gcc-14 g++-14 lld
              sudo apt-get install -y libglu1-mesa-dev libdwarf-dev libelf-dev
              # SDL3 source build requires X11/Wayland dev headers.
              sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev \
                libxcursor-dev libxi-dev libxfixes-dev \
                libwayland-dev libxkbcommon-dev
            fi

      - name: '[android] Install SDL3 dev dependencies'
        if: env.MATRIX_PLATFORM == 'android'
        run: |
          # SDL3 cmake() is invoked in the host (linux) config during Android
          # cross-compilation and requires X11/Wayland headers to configure.
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev \
            libxcursor-dev libxi-dev libxfixes-dev \
            libwayland-dev libxkbcommon-dev
          # android_armeabi_v7a: LuaJIT HOST tools (buildvm, minilua) must be compiled
          # as 32-bit x86 (gcc-14 -m32) to match the 32-bit ARM target struct layout.
          # gcc-14-multilib provides the 32-bit runtime and headers for gcc -m32.
          if [ "${{matrix.target}}" = "android_armeabi_v7a" ]; then
            sudo apt-get install -y gcc-14-multilib
          fi

      - name: '[windows] Set up MSVC'
        if: env.MATRIX_PLATFORM == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: '[windows] Build LuaJIT via CMake'
        if: env.MATRIX_PLATFORM == 'windows'
        # The Bazel @luajit_windows wrapper references CMake-built artifacts:
        #   build/thirdparty/Debug/libluajit.lib
        #   build/thirdparty/luajit.h
        # LuaJIT's GNU Makefile requires GCC, so we use the luajit-cmake wrapper to build
        # it with MSVC. The cmake configure step also downloads the prebuilt SDL3/OpenAL/etc.
        # archives (needed to satisfy find_package), but Bazel uses its own source builds for those.
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --config Debug --target libluajit

      - name: 'Set up Bazel'
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-version: 1.x
          bazelisk-cache: true
          disk-cache: '${{github.workflow}}-${{matrix.target}}'
          repository-cache: true

      - name: 'Build'
        run: |
          bazel build --config=${{env.MATRIX_BAZEL_CONFIG}} //src/Bin/OpenEnroth:OpenEnroth

      - name: '[non-android] Build unit test'
        if: env.MATRIX_PLATFORM != 'android'
        run: |
          bazel build --config=${{env.MATRIX_BAZEL_CONFIG}} //test/Bin/UnitTest:OpenEnroth_UnitTest

      - name: '[non-android] Run unit tests'
        if: env.MATRIX_PLATFORM != 'android'
        run: |
          bazel run --config=${{env.MATRIX_BAZEL_CONFIG}} //test/Bin/UnitTest:OpenEnroth_UnitTest
