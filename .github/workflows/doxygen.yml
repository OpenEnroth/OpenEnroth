name: Doxygen

on:
  pull_request: null
  push: null
  workflow_dispatch:
    inputs:
      myCommit:
        description: Commit SHA1
        required: false
        default: ''
        type: string
  release:
    types:
      - published

jobs:
  generate_documentation:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: '${{ inputs.myCommit }}'

      - name: Install Doxygen
        run: |
          curl -fsSL --retry 3 -o doxygen.tar.gz https://github.com/doxygen/doxygen/releases/download/Release_1_9_5/doxygen-1.9.5.linux.bin.tar.gz
          tar xzf doxygen.tar.gz --strip-components=2 doxygen-1.9.5/bin/doxygen -C .

      - name: Generate Documentation
        run: |
          export PROJECT_NUMBER="$(git describe --always --tags --dirty)"
          ./doxygen Doxyfile
          touch docs/html/.nojekyll

  deploy_documentation:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Doxygen
        run: |
          curl -fsSL --retry 3 -o doxygen.tar.gz https://github.com/doxygen/doxygen/releases/download/Release_1_9_5/doxygen-1.9.5.linux.bin.tar.gz
          tar xzf doxygen.tar.gz --strip-components=2 doxygen-1.9.5/bin/doxygen -C .

      - name: Generate Documentation
        run: |
          export PROJECT_NUMBER="$(git describe --always --tags --dirty)"
          ./doxygen Doxyfile
          touch docs/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.4.0
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          branch: gh-pages
          folder: docs/html
          target-folder: .
